<!DOCTYPE html>
<html lang="en">

<head>
	<base target="_top">
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<title>بلدية أولاد جلال | نظام المعلومات الجغرافي</title>

	<link rel="shortcut icon" type="image/x-icon" href="favicon.ico" />

	<link rel="stylesheet" href="css/leaflet.css?v=0.0.1" />
	<script src="js/leaflet.js?v0.0.1"></script>

	<style>
		html,
		body {
			height: 100%;
			margin: 0;
		}

		.leaflet-container {
			height: 400px;
			width: 600px;
			max-width: 100%;
			max-height: 100%;
		}

		body {
			padding: 0;
			margin: 0;
		}

		#map {
			height: 100%;
			width: 100vw;
		}
	</style>
</head>

<body>

	<div id='map'></div>

	<script src="data/street_0.js"></script>

	<script>

		const baseLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
			maxZoom: 28,
			attribution: '&copy; <a href="http://www.apcouleddjellal.dz">APC OULED DJELLAL</a>'
		});

		var layer_street_0 = new L.geoJson(json_street_0, {
			attribution: '',
			interactive: true,
			dataVar: 'json_street_0',
			layerName: 'layer_street_0',
			pane: 'pane_street_0',
			style: {
				pane: 'pane_street_0',
				opacity: 1,
				color: 'rgba(251,154,153,1.0)',
				dashArray: '',
				lineCap: 'square',
				lineJoin: 'bevel',
				weight: 2.0,
				fillOpacity: 0,
				interactive: true,
			},
		});

		const map = L.map('map', {
			zoomControl: true,
			maxZoom: 28,
			minZoom: 1,
			layers: [baseLayer],
		}).fitBounds([[34.4264596291723, 5.048961433001758], [34.44650761992561, 5.086404979127573]]);

		map.createPane('pane_street_0');
		map.getPane('pane_street_0').style.zIndex = 400;
		map.getPane('pane_street_0').style['mix-blend-mode'] = 'normal';
		//bounds_group.addLayer(layer_street_0);

		L.control.layers({ "صور القمر الصناعي": baseLayer }, { "الشوارع": layer_street_0 }).addTo(map);

		function onLocationFound(e) {
			const radius = e.accuracy / 2;

			const locationMarker = L.marker(e.latlng).addTo(map)
				.bindPopup(`You are within ${radius} meters from this point`).openPopup();

			const locationCircle = L.circle(e.latlng, radius).addTo(map);
		}

		function onLocationError(e) {
			//alert(e.message);
		}

		map.on('locationfound', onLocationFound);
		map.on('locationerror', onLocationError);

		//map.locate({setView: true, maxZoom: 16});
	</script>



</body>

</html>
